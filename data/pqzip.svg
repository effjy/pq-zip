<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Dark cyber background, green-tinted to match the app theme. -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2618"/>
      <stop offset="1" stop-color="#070f0b"/>
    </linearGradient>
    <!-- Box faces. -->
    <linearGradient id="boxtop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10331f"/>
      <stop offset="1" stop-color="#0c2417"/>
    </linearGradient>
    <linearGradient id="boxbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c2417"/>
      <stop offset="1" stop-color="#0a1c11"/>
    </linearGradient>
    <!-- Neon green→cyan for the zipper. -->
    <linearGradient id="zip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#39ff14"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- Panel -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"
        stroke="#39ff14" stroke-width="3" stroke-opacity="0.55"/>

  <!-- Faint circuit traces -->
  <g stroke="#39ff14" stroke-opacity="0.16" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M28 72 H60"/>
    <path d="M228 184 H196"/>
    <circle cx="60" cy="72" r="4" fill="#39ff14" fill-opacity="0.3" stroke="none"/>
    <circle cx="196" cy="184" r="4" fill="#39ff14" fill-opacity="0.3" stroke="none"/>
  </g>

  <!-- Archive box: lid + body, glow underlay then neon border -->
  <rect x="52" y="74" width="152" height="40" rx="10"
        fill="none" stroke="#39ff14" stroke-opacity="0.25" stroke-width="12"/>
  <rect x="52" y="74" width="152" height="40" rx="10"
        fill="url(#boxtop)" stroke="#39ff14" stroke-width="4"/>
  <rect x="64" y="110" width="128" height="104" rx="12"
        fill="none" stroke="#39ff14" stroke-opacity="0.25" stroke-width="12"/>
  <rect x="64" y="110" width="128" height="104" rx="12"
        fill="url(#boxbody)" stroke="#39ff14" stroke-width="4"/>

  <!-- Zipper teeth running down the seam -->
  <g fill="url(#zip)">
    <rect x="116" y="120" width="10" height="6" rx="1"/>
    <rect x="130" y="120" width="10" height="6" rx="1"/>
    <rect x="116" y="132" width="10" height="6" rx="1"/>
    <rect x="130" y="132" width="10" height="6" rx="1"/>
    <rect x="116" y="144" width="10" height="6" rx="1"/>
    <rect x="130" y="144" width="10" height="6" rx="1"/>
  </g>
  <!-- Zipper pull -->
  <rect x="120" y="158" width="16" height="30" rx="6" fill="url(#zip)"/>
  <circle cx="128" cy="165" r="4" fill="#0a1c11"/>

  <!-- Post-quantum atom orbiting the box -->
  <g stroke="url(#zip)" stroke-width="3.5" fill="none" opacity="0.92">
    <ellipse cx="128" cy="190" rx="40" ry="16"/>
    <ellipse cx="128" cy="190" rx="40" ry="16" transform="rotate(60 128 190)"/>
    <ellipse cx="128" cy="190" rx="40" ry="16" transform="rotate(120 128 190)"/>
  </g>
  <circle cx="128" cy="190" r="6" fill="url(#zip)"/>
</svg>
